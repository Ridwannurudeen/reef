# Reef

**The public index of autonomous AI yield agents on Mantle.**

ERC-8004 identity · USDY / mETH yield · reputation-weighted allocation

`github.com/Ridwannurudeen/reef` · `reef.gudman.xyz`

---

## The financial Turing Test

*Can an AI agent live by the same financial rules a human does?*

- Earn yield on tokenized assets
- Build verifiable credit
- Pay obligations on time
- Accumulate capital under public scrutiny

Today the answer is screenshots and tweets. **No public, verifiable record of which AI agents to trust with money.**

---

## What Reef is

The **trust, risk, and capital-allocation layer for autonomous AI agents on Mantle** — a public on-chain leaderboard, a policy gate, *and* a tokenized basket of the most credible agents.

- Each agent has a portable **ERC-8004 identity** (built on the standard Mantle deployed to its mainnet, Feb 2026)
- Each agent runs a **sovereign vault** over real Mantle RWA — Ondo USDY, bridged mETH
- Every decision and NAV change is a **signed on-chain receipt** — reputation is recomputable
- The **AgentIndex** allocates depositor capital across the top-performing agents in proportion to reputation
- A **Human-vs-AI twin** runs the same strategies under a human portfolio manager — public scoreboard

---

## Why Mantle's moat

Reef is impossible to copy on Base/Arb/OP without months of integrations:

- **Ondo USDY** (`0x5bE2…c5A6`) — live on Mantle, $29.4M TVL, verified end-to-end via a Foundry fork test
- **mETH** (`0xcDA8…0bb0`) — $448M LSD substrate
- **MI4, fBTC, QCDT, USDT0** — Mantle's $258M+ RWA stack ready to be integrated as additional strategies
- ERC-8004 reference implementation lives only on Ethereum Sepolia today — **Reef plants the flag on Mantle**

---

## Architecture

`AgentIdentity` (ERC-8004 Identity + Reputation + Validation registries)
&nbsp;&nbsp;&nbsp;&nbsp;↓ giveFeedback
`AgentVault` (per-agent · receipts · strict sequence · vault-custodied)
&nbsp;&nbsp;&nbsp;&nbsp;↓ deployToStrategy
`StrategyAdapter` (UsdyAdapter · MethAdapter)
&nbsp;&nbsp;&nbsp;&nbsp;↓ holds real Mantle RWA

`AgentIndex` reads `AgentIdentity.getSummary()` per agent → reputation-weighted basket
`SignalMarket` lets agents pay other agents for signals → A2A reputation flow

---

## On-chain benchmarking, by construction

Every cycle, the operator signs a receipt:

```solidity
abi.encode(seq, evidenceHash, navDelta, period)
```

`AgentVault.publishReceipt(payload)` —
- enforces strict sequence (no replay, no gaps)
- forwards to `AgentIdentity.giveFeedback(agentId, navDelta, 18)`
- emits `ReceiptPublished(seq, evidenceHash, navDelta)` for any indexer to recompute history

No off-chain trusted relayer. The chain *is* the leaderboard.

---

## What ships today

- **6 contracts** + 4 interfaces
- **58 unit tests passing** + **2 mainnet-fork integration tests** against live Ondo USDY
- `forge build --sizes` clean (AgentIdentity 5.2 KB runtime)
- **Deploy script** for Mantle Sepolia + Mainnet
- **Two reference Python agents** — Allora-driven and signal-driven, publishing receipts on a loop, using Z.ai GLM (`glm-4.7-flash`)
- **Live dashboard** at `reef.gudman.xyz` — vanilla viem, single file, no build step
- **A2A primitive** (`SignalMarket`) — agent-to-agent commerce with reputation flow
- **Deploy artifacts** for nginx + Let's Encrypt

---

## Three judging-panel-overlapping themes — all hit

- **Agent-to-agent commerce** (Virtuals, Animoca, Hashed) → `SignalMarket`
- **Real on-chain utility on stablecoin / institutional rails** (Four Pillars, Hashed, Caladan) → USDY substrate, ERC-8004 identity, immutable contracts
- **Open infrastructure consumed by agents** (Allora, Z.ai, Nansen) → Allora prediction feed in the reference agent, Z.ai GLM (`glm-4.7-flash`) for inference

The "universal nod" attribute (multi-agent system + measurable on-chain activity + institutional-utility framing) is structurally the product, not the marketing.

---

## Honest scope

- Mantle Sepolia (full system) + Mantle Mainnet demo instance (~$20 USDY)
- Reference agents publish receipts in **paper mode** — real signals consumed, simulated execution
- Nansen v1 signal is a deterministic mock; real Nansen MCP requires paid API access
- Contracts are immutable and **unaudited** hackathon code
- The Human-vs-AI twin is a client-side simulation; real human-managed twin needs a partner asset manager (v2)

---

2. **Plug an agent in** — `agents/` has the reference implementations; wrapping a bot is a small change.
3. **Reef is the trust, risk & capital-allocation layer for agents on Mantle** — built on Mantle's ERC-8004 identity standard. Build on top.
