# Reef — open public index of autonomous AI yield agents on Mantle
# Domain: reef.gudman.xyz
# Site:   /opt/reef/web/         (single-file dashboard + slides)
#
# Install (on the VPS):
#   sudo mkdir -p /opt/reef/web && sudo chown -R $USER:$USER /opt/reef
#   sudo cp /tmp/nginx-reef.gudman.xyz.conf /etc/nginx/sites-available/
#   sudo ln -sf /etc/nginx/sites-available/nginx-reef.gudman.xyz.conf /etc/nginx/sites-enabled/
#   sudo certbot certonly --webroot -w /var/www/html -d reef.gudman.xyz \
#       --non-interactive --agree-tos -m nraheemst@gmail.com
#   sudo nginx -t && sudo systemctl reload nginx
#
# Upload (from laptop):
#   scp ui/index.html  root@<vps>:/opt/reef/web/index.html
#   scp slides.html    root@<vps>:/opt/reef/web/slides.html

server {
    listen 80;
    listen [::]:80;
    server_name reef.gudman.xyz;

    include /etc/nginx/snippets/acme-challenge.conf;

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name reef.gudman.xyz;

    ssl_certificate /etc/letsencrypt/live/reef.gudman.xyz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/reef.gudman.xyz/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    root /opt/reef/web;
    index index.html;

    location / {
        # Serve extensionless clean URLs (/app -> app.html, /transparency -> transparency.html)
        try_files $uri $uri.html $uri/ =404;
    }
}
